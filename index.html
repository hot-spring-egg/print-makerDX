<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>オリジナルプリントメーカーDX（ローカル保存版）</title>
  
  <!-- Fonts: Klee One (教科書体に近い手書き風フォント) を読み込み -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Klee+One:wght@400;600&display=swap" rel="stylesheet">
  
  <!-- React & Babel -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'sage': '#81B29A',
            'cream': '#F4F1DE',
            'bluegrey': '#3D405B',
            'terracotta': '#E07A5F',
            'mustard': '#F2CC8F'
          }
        }
      }
    }
  </script>

  <style>
    /* 全体のベース設定 */
    body {
      background-color: #F4F1DE;
      color: #3D405B;
      font-family: "UD デジタル 教科書体 NP-R", "UD デジタル 教科書体 N-R", "Klee One", sans-serif;
    }

    /* 縦書き文章エリア */
    .print-content {
      writing-mode: vertical-rl;
      text-orientation: mixed;
      font-size: calc(2.2rem * var(--size-scale, 1));
      line-height: 1.6;
      height: 100%;
    }

    .print-content p {
      margin-right: 0;
      margin-top: 0;
      margin-bottom: 0;
      min-height: 1em;
      width: 100%;
    }

    /* --- 書き問題用：穴埋めのマス目 --- */
    .masu-inline {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      width: calc(4rem * var(--size-scale, 1));
      height: calc(4rem * var(--size-scale, 1));
      border: 1px solid #81B29A;
      background-color: white;
      position: relative;
      vertical-align: middle;
      text-orientation: upright;
      margin-bottom: -1px;
    }

    .masu-inline::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 0;
      width: 100%;
      height: 0;
      border-top: 1px dashed rgba(129, 178, 154, 0.6);
      z-index: 1;
    }
    .masu-inline::after {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      width: 0;
      height: 100%;
      border-left: 1px dashed rgba(129, 178, 154, 0.6);
      z-index: 1;
    }

    .masu-char {
      z-index: 2;
      position: relative;
      font-size: calc(3rem * var(--size-scale, 1));
      line-height: 1;
    }

    ruby {
      ruby-align: center;
      ruby-position: over;
    }
    rt {
      font-size: calc(1.2rem * var(--size-scale, 1));
      color: #3D405B;
      letter-spacing: 0.1em;
      transform: translateX(-2px);
    }

    /* --- 読み問題用：カッコ付きルビ --- */
    .yomi-ruby {
      ruby-align: center;
    }
    .yomi-rt {
      font-size: calc(2.2rem * var(--size-scale, 1));
      color: #3D405B;
      letter-spacing: 0.1em;
      transform: translateX(-4px); 
    }
    .yomi-bracket {
      color: #81B29A;
      font-size: calc(3.5rem * var(--size-scale, 1));
      font-weight: normal;
      vertical-align: middle;
      font-family: "UD デジタル 教科書体 NP-R", "Klee One", serif;
    }
    .yomi-answer {
      vertical-align: middle;
    }

    /* スクロールバー */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #F4F1DE; }
    ::-webkit-scrollbar-thumb { background: #81B29A; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #3D405B; }

    input[type=range] {
      accent-color: #81B29A;
    }

    /* 印刷用の設定（A4 横向き・複数ページ対応） */
    @page { 
      size: A4 landscape; 
      margin: 0; 
    }
    @media print {
      body { background-color: white; }
      .noprint { display: none !important; }
      .print-area {
        width: 297mm;  
        height: 210mm; 
        margin: 0;
        padding: 15mm 20mm; 
        box-shadow: none;
        background: white;
        page-break-after: always;
        break-after: page;
      }
    }
    .print-area {
      width: 297mm;
      height: 210mm;
      padding: 15mm 20mm;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const SaveIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>;
    const PrinterIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>;
    const FolderIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>;
    const TrashIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>;
    const PlusIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>;
    const EyeIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>;
    const EyeOffIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>;
    const ScissorsIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="6" cy="6" r="3"></circle><circle cx="6" cy="18" r="3"></circle><line x1="20" y1="4" x2="8.12" y2="15.88"></line><line x1="14.47" y1="14.48" x2="20" y2="20"></line><line x1="8.12" y1="8.12" x2="12" y2="12"></line></svg>;

    // 縦書き用の名前欄
    const VerticalNameField = () => (
      <div className="font-sans text-[1.1rem] text-bluegrey tracking-widest" style={{ writingMode: 'vertical-rl' }}>
        <div className="ml-5">
          <span className="inline-block">ねん</span>
          <span className="inline-block mt-6">くみ</span>
        </div>
        <div className="flex items-center">
          <span className="inline-block">なまえ</span>
          <span className="inline-block w-[1px] h-48 bg-bluegrey mt-3"></span>
        </div>
      </div>
    );

    const STORAGE_KEY = 'kakikata_prints_data_v17';

    const App = () => {
      const [title, setTitle] = useState('');
      
      // 段組みの威力がわかりやすいサンプルテキスト
      const [text, setText] = useState('あさ、{早:はや}く[起:お]きる。\n[学:がっ][校:こう]に、{行:い}きます。\n{友:とも}だちと、あそぶ。\n[本:ほん]を{読:よ}む。\nえんぴつで、[字:じ]を{書:か}く。\n[先:せん][生:せい]に、あいさつする。');
      
      const [savedPrints, setSavedPrints] = useState([]);
      const [currentId, setCurrentId] = useState(null);
      const [notification, setNotification] = useState('');
      
      const [hideBlanks, setHideBlanks] = useState(true);
      const [lineSpacing, setLineSpacing] = useState(1.6); 
      const [sizeScale, setSizeScale] = useState(1.0);
      const [namePosition, setNamePosition] = useState('right');
      
      // ★ 追加：段組みの数（デフォルトは3段）
      const [columnCount, setColumnCount] = useState(3);

      const textareaRef = useRef(null);

      useEffect(() => {
        const loadedData = localStorage.getItem(STORAGE_KEY);
        if (loadedData) {
          try {
            setSavedPrints(JSON.parse(loadedData));
          } catch (e) {
            console.error("データの読み込みに失敗しました", e);
          }
        }
      }, []);

      useEffect(() => {
        if (notification) {
          const timer = setTimeout(() => setNotification(''), 3000);
          return () => clearTimeout(timer);
        }
      }, [notification]);

      const insertAtCursor = (template, cursorOffset) => {
        const textarea = textareaRef.current;
        if (!textarea) return;

        const start = textarea.selectionStart;
        const end = textarea.selectionEnd;
        const currentText = text;

        const newText = currentText.substring(0, start) + template + currentText.substring(end);
        setText(newText);

        setTimeout(() => {
          textarea.focus();
          textarea.setSelectionRange(start + cursorOffset, start + cursorOffset);
        }, 0);
      };

      const handleSave = () => {
        if (!title.trim()) {
          alert('プリントのタイトルを入力してください。');
          return;
        }

        const newPrint = {
          id: currentId || Date.now().toString(),
          title: title,
          text: text,
          lineSpacing: lineSpacing,
          sizeScale: sizeScale,
          namePosition: namePosition,
          columnCount: columnCount, // 段組みも保存
          updatedAt: new Date().toLocaleString('ja-JP')
        };

        let updatedPrints;
        if (currentId) {
          updatedPrints = savedPrints.map(p => p.id === currentId ? newPrint : p);
        } else {
          updatedPrints = [newPrint, ...savedPrints];
          setCurrentId(newPrint.id);
        }

        setSavedPrints(updatedPrints);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(updatedPrints));
        setNotification('✨ プリントを保存しました！');
      };

      const handleLoad = (print) => {
        setTitle(print.title);
        setText(print.text);
        setLineSpacing(print.lineSpacing || 1.6);
        setSizeScale(print.sizeScale || 1.0);
        setNamePosition(print.namePosition || 'right');
        setColumnCount(print.columnCount || 3);
        setCurrentId(print.id);
        setNotification(`📂 「${print.title}」をひらきました。`);
      };

      const handleDelete = (e, id) => {
        e.stopPropagation();
        if (confirm('このプリントを削除してもよろしいですか？')) {
          const updatedPrints = savedPrints.filter(p => p.id !== id);
          setSavedPrints(updatedPrints);
          localStorage.setItem(STORAGE_KEY, JSON.stringify(updatedPrints));
          
          if (currentId === id) {
            handleNew();
          }
          setNotification('🗑️ プリントを削除しました。');
        }
      };

      const handleNew = () => {
        setTitle('');
        setText('あさ、{早:はや}く[起:お]きる。\n[学:がっ][校:こう]に、{行:い}きます。\n{友:とも}だちと、あそぶ。\n[本:ほん]を{読:よ}む。');
        setLineSpacing(1.6);
        setSizeScale(1.0);
        setNamePosition('right');
        setColumnCount(3);
        setCurrentId(null);
      };

      const handlePrint = () => {
        window.print();
      };

      // 1行ごとの解析
      const lines = text.split('\n');
      const parsedLines = lines.map(line => {
        if (line.trim() === '---') {
          return [{ type: 'page-break' }];
        }

        const parts = [];
        const regex = /\[([^\]:]+)(?::([^\]]+))?\]|\{([^\}:]+)(?::([^\}]+))?\}/gu;
        let lastIndex = 0;
        let match;
        
        while ((match = regex.exec(line)) !== null) {
          if (match.index > lastIndex) {
            parts.push({ type: 'text', content: line.substring(lastIndex, match.index) });
          }
          if (match[1] !== undefined) {
            parts.push({ type: 'write', char: match[1], ruby: match[2] || '' });
          } else if (match[3] !== undefined) {
            parts.push({ type: 'read', char: match[3], ruby: match[4] || '' });
          }
          lastIndex = regex.lastIndex;
        }
        if (lastIndex < line.length) {
          parts.push({ type: 'text', content: line.substring(lastIndex) });
        }
        return parts;
      });

      // ★ 段組みの処理：指定された段数（columnCount）ごとに行を束ねる
      const chunks = [];
      let currentChunk = [];
      parsedLines.forEach(lineCells => {
        if (lineCells.length === 1 && lineCells[0].type === 'page-break') {
           if (currentChunk.length > 0) {
             chunks.push(currentChunk);
             currentChunk = [];
           }
           chunks.push('PAGE_BREAK');
        } else {
           currentChunk.push(lineCells);
           if (currentChunk.length === columnCount) {
             chunks.push(currentChunk);
             currentChunk = [];
           }
        }
      });
      if (currentChunk.length > 0) {
        chunks.push(currentChunk);
      }

      // ★ ページ分割の計算（チャンクの幅で計算する）
      const A4_WIDTH_PX = 1122; 
      const PADDING_PX = 151;   
      const NAME_FIELD_PX = ['right', 'left'].includes(namePosition) ? 120 : 0; 
      const AVAILABLE_WIDTH_PX = A4_WIDTH_PX - PADDING_PX - NAME_FIELD_PX;

      const pages = [];
      let currentPage = [];
      let currentWidth = 0;

      chunks.forEach(chunk => {
        if (chunk === 'PAGE_BREAK') {
          if (currentPage.length > 0) {
            pages.push(currentPage);
            currentPage = [];
            currentWidth = 0;
          }
          return;
        }

        // そのチャンク（列）の中で一番幅をとる行の幅を基準にする
        let maxBaseWidthRem = 3.5; // 文字のみの基本幅
        chunk.forEach(lineCells => {
          const hasMasu = lineCells.some(p => p.type === 'write' || p.type === 'read');
          if (hasMasu) maxBaseWidthRem = 4.5;
        });
        const colWidthPx = (maxBaseWidthRem * sizeScale + lineSpacing) * 16; 

        if (currentWidth + colWidthPx > AVAILABLE_WIDTH_PX && currentPage.length > 0) {
          pages.push(currentPage);
          currentPage = [chunk];
          currentWidth = colWidthPx;
        } else {
          currentPage.push(chunk);
          currentWidth += colWidthPx;
        }
      });
      if (currentPage.length > 0) {
        pages.push(currentPage);
      }
      if (pages.length === 0) {
        pages.push([]);
      }

      return (
        <div className="min-h-screen flex flex-col md:flex-row">
          
          {/* 左側：編集・管理パネル */}
          <div className="w-full md:w-1/3 lg:w-1/4 bg-white shadow-xl z-10 flex flex-col h-screen noprint">
            
            <div className="bg-sage text-white p-4 shadow-md">
              <h1 className="text-xl font-bold flex items-center gap-2">
                <span className="bg-cream text-sage rounded-full w-8 h-8 flex items-center justify-center text-lg">🎒</span>
                プリントメーカーDX
              </h1>
              <p className="text-sm mt-1 opacity-90">3段組・テスト特化版</p>
            </div>

            <div className="p-4 flex-1 overflow-y-auto">
              
              {notification && (
                <div className="mb-4 p-3 bg-mustard/20 text-bluegrey rounded-lg text-sm font-bold border-l-4 border-mustard flex items-center">
                  {notification}
                </div>
              )}

              <div className="space-y-4">
                <div>
                  <label className="block text-sm font-bold text-bluegrey mb-1">プリントのタイトル（保存用）</label>
                  <input 
                    type="text" 
                    value={title}
                    onChange={(e) => setTitle(e.target.value)}
                    placeholder="例：2ねんせい かんじテスト"
                    className="w-full border-2 border-sage/30 rounded-lg p-2 focus:outline-none focus:border-sage bg-cream/30 font-sans"
                  />
                </div>

                <div>
                  <label className="block text-sm font-bold text-bluegrey mb-1">練習する文字・問題</label>
                  <p className="text-[0.7rem] text-bluegrey/70 mb-1 leading-tight">
                    ※改行すると次の段（上→中→下）に進みます。<br/>※1行空けると、その段は空欄になります。
                  </p>
                  {/* 入力支援・改ページボタンエリア */}
                  <div className="flex gap-1 mb-2 font-sans flex-wrap">
                    <button 
                      onClick={() => insertAtCursor('[:]', 1)}
                      className="flex-1 min-w-[70px] py-1.5 bg-sage hover:bg-[#689880] text-white text-xs font-bold rounded shadow transition-colors flex items-center justify-center"
                    >
                      [ ] 書き
                    </button>
                    <button 
                      onClick={() => insertAtCursor('{:}', 1)}
                      className="flex-1 min-w-[70px] py-1.5 bg-bluegrey hover:bg-[#2c2f45] text-white text-xs font-bold rounded shadow transition-colors flex items-center justify-center"
                    >
                      {`{ }`} 読み
                    </button>
                    <button 
                      onClick={() => insertAtCursor('[　]', 2)}
                      className="flex-1 min-w-[70px] py-1.5 bg-white border border-sage text-sage hover:bg-sage hover:text-white text-xs font-bold rounded shadow transition-colors flex items-center justify-center"
                    >
                      [　] 空マス
                    </button>
                    <button 
                      onClick={() => insertAtCursor('\n---\n', 5)}
                      className="flex-1 min-w-[70px] py-1.5 bg-terracotta hover:bg-[#c2654d] text-white text-xs font-bold rounded shadow transition-colors flex items-center justify-center gap-1"
                      title="ここでプリントを次のページに分けます"
                    >
                      <ScissorsIcon /> 改ページ
                    </button>
                  </div>

                  <textarea 
                    ref={textareaRef}
                    value={text}
                    onChange={(e) => setText(e.target.value)}
                    rows="8"
                    placeholder="問題を入力してください。"
                    className="w-full border-2 border-sage/30 rounded-lg p-2 focus:outline-none focus:border-sage bg-cream/30 resize-none font-sans leading-relaxed"
                  ></textarea>
                </div>

                {/* デザイン・レイアウト設定 */}
                <div className="bg-cream/50 p-3 rounded-lg border border-sage/20 space-y-3">
                  
                  {/* ★ 段組みセレクトボックス */}
                  <div>
                    <label className="block text-xs font-bold text-bluegrey mb-1">
                      段組み（問題のならべ方）
                    </label>
                    <select 
                      value={columnCount}
                      onChange={(e) => setColumnCount(Number(e.target.value))}
                      className="w-full border-2 border-sage/30 rounded-lg p-1.5 text-sm bg-white focus:outline-none focus:border-sage text-bluegrey font-bold cursor-pointer"
                    >
                      <option value={1}>1段（上から下まで）</option>
                      <option value={2}>2段組（上・下）</option>
                      <option value={3}>3段組（上・中・下）</option>
                      <option value={4}>4段組</option>
                    </select>
                  </div>

                  <div>
                    <label className="block text-xs font-bold text-bluegrey mb-1">
                      なまえ欄の配置
                    </label>
                    <select 
                      value={namePosition}
                      onChange={(e) => setNamePosition(e.target.value)}
                      className="w-full border-2 border-sage/30 rounded-lg p-1.5 text-sm bg-white focus:outline-none focus:border-sage text-bluegrey font-bold cursor-pointer"
                    >
                      <option value="right">右 （縦書き・下部）※おすすめ</option>
                      <option value="left">左 （縦書き・下部）</option>
                      <option value="top">上 （横書き・右端）</option>
                      <option value="bottom">下 （横書き・左端）</option>
                      <option value="none">なし （表示しない）</option>
                    </select>
                  </div>

                  <div>
                    <label className="block text-xs font-bold text-bluegrey mb-1">
                      文字とマスの大きさ
                    </label>
                    <div className="flex items-center gap-3">
                      <span className="text-xs text-bluegrey/70 font-bold">小</span>
                      <input 
                        type="range" 
                        min="0.6" max="1.6" step="0.1"
                        value={sizeScale}
                        onChange={(e) => setSizeScale(parseFloat(e.target.value))}
                        className="flex-1 cursor-pointer h-2"
                      />
                      <span className="text-xs text-bluegrey/70 font-bold">大</span>
                    </div>
                  </div>

                  <div>
                    <label className="block text-xs font-bold text-bluegrey mb-1">
                      列と列のすき間
                    </label>
                    <div className="flex items-center gap-3">
                      <span className="text-xs text-bluegrey/70 font-bold">狭</span>
                      <input 
                        type="range" 
                        min="0.5" max="6.0" step="0.2"
                        value={lineSpacing}
                        onChange={(e) => setLineSpacing(parseFloat(e.target.value))}
                        className="flex-1 cursor-pointer h-2"
                      />
                      <span className="text-xs text-bluegrey/70 font-bold">広</span>
                    </div>
                  </div>
                </div>

                <div className="flex justify-end font-sans">
                  <button
                    onClick={() => setHideBlanks(!hideBlanks)}
                    className={`text-sm px-3 py-1.5 rounded-full flex items-center gap-1 font-bold transition-colors ${hideBlanks ? 'bg-terracotta text-white' : 'bg-cream text-terracotta border border-terracotta'}`}
                  >
                    {hideBlanks ? <><EyeOffIcon /> 児童用（解答を隠す）</> : <><EyeIcon /> 先生用（解答を表示）</>}
                  </button>
                </div>

                <div className="flex gap-2 font-sans pb-4">
                  <button 
                    onClick={handleSave}
                    className="flex-1 bg-sage hover:bg-[#689880] text-white font-bold py-2.5 px-4 rounded-lg shadow-md transition-colors flex items-center justify-center gap-2"
                  >
                    <SaveIcon /> 保存
                  </button>
                  <button 
                    onClick={handlePrint}
                    className="flex-1 bg-bluegrey hover:bg-[#2c2f45] text-white font-bold py-2.5 px-4 rounded-lg shadow-md transition-colors flex items-center justify-center gap-2"
                  >
                    <PrinterIcon /> 印刷
                  </button>
                </div>
              </div>

              <div className="border-b-2 border-dashed border-sage/30 mb-4"></div>

              <div className="font-sans pb-8">
                <div className="flex items-center justify-between mb-3">
                  <h2 className="text-lg font-bold text-bluegrey flex items-center gap-2">
                    <FolderIcon /> 保存したプリント
                  </h2>
                  <button 
                    onClick={handleNew}
                    className="text-sm bg-cream text-bluegrey hover:bg-mustard px-2 py-1 rounded shadow-sm transition-colors flex items-center gap-1 font-bold"
                  >
                    <PlusIcon /> 新規
                  </button>
                </div>

                <div className="space-y-2 bg-cream/50 p-2 rounded-xl border border-sage/20">
                  {savedPrints.length === 0 ? (
                    <p className="text-sm text-center text-bluegrey/60 py-4">保存されたプリントはありません</p>
                  ) : (
                    savedPrints.map((print) => (
                      <div 
                        key={print.id} 
                        onClick={() => handleLoad(print)}
                        className={`group relative p-2.5 rounded-lg cursor-pointer transition-all shadow-sm border-l-4 ${currentId === print.id ? 'bg-white border-sage shadow-md' : 'bg-white/60 border-transparent hover:bg-white hover:border-sage/50'}`}
                      >
                        <h3 className="font-bold text-bluegrey truncate pr-6 text-sm">{print.title}</h3>
                        <p className="text-[10px] text-bluegrey/60 mt-1">{print.updatedAt}</p>
                        
                        <button 
                          onClick={(e) => handleDelete(e, print.id)}
                          className="absolute top-1/2 right-2 -translate-y-1/2 text-terracotta/50 hover:text-terracotta bg-cream hover:bg-red-50 p-1 rounded opacity-0 group-hover:opacity-100 transition-all"
                          title="削除する"
                        >
                          <TrashIcon />
                        </button>
                      </div>
                    ))
                  )}
                </div>
              </div>

            </div>
          </div>

          {/* 右側：プレビュー＆印刷エリア */}
          <div className="w-full md:w-2/3 lg:w-3/4 bg-bluegrey/10 overflow-auto flex flex-col items-center p-4 md:p-8 noprint-bg gap-8">
            
            {pages.map((pageChunks, pageIndex) => (
              <div key={pageIndex} className="print-area bg-white shadow-2xl rounded-sm flex flex-col relative overflow-hidden shrink-0">
                
                {namePosition === 'top' && (
                  <div className="flex justify-between items-end border-b-2 border-bluegrey pb-2 mb-4 shrink-0 font-sans">
                    <div className="text-2xl font-bold text-bluegrey tracking-widest pl-2">
                      {title || 'プリント'} 
                      {pages.length > 1 && <span className="text-lg ml-2 opacity-60">({pageIndex + 1}/{pages.length})</span>}
                    </div>
                    
                    <div className="flex gap-4">
                      <div className="text-lg text-bluegrey flex items-end">
                        <span className="mr-2">ねん</span>
                        <span className="mr-2">くみ</span>
                      </div>
                      <div className="text-lg text-bluegrey flex items-end">
                        <span>なまえ</span>
                        <div className="w-48 border-b border-bluegrey ml-2"></div>
                      </div>
                    </div>
                  </div>
                )}

                <div className="flex-1 flex flex-row-reverse justify-start overflow-hidden">
                  
                  {namePosition === 'right' && (
                    <div className="shrink-0 flex flex-col justify-end pb-8 pl-4 pr-2">
                      <VerticalNameField />
                    </div>
                  )}

                  {/* ★ 段組み対応の本文エリア */}
                  <div 
                    className={`print-content flex-1 ${namePosition === 'top' ? 'pt-2' : 'pt-4'}`} 
                    style={{ '--size-scale': sizeScale }}
                  >
                    {pageChunks.map((chunk, colIndex) => (
                      <div key={colIndex} style={{ 
                        display: 'flex', 
                        flexDirection: 'row', /* 縦書き環境でのrowは上から下へ流れる */
                        marginLeft: `${lineSpacing}rem` 
                      }}>
                        {chunk.map((lineCells, rowIndex) => (
                          <div key={rowIndex} style={{
                            flex: 1, // 各段の高さを均等に分割する
                            display: 'flex',
                            justifyContent: 'flex-start',
                            /* 最後の段以外には、下に薄い点線の区切りを引く */
                            borderInlineEnd: rowIndex < chunk.length - 1 ? '1px dashed rgba(129, 178, 154, 0.4)' : 'none',
                            paddingInlineEnd: rowIndex < chunk.length - 1 ? '1rem' : '0',
                            marginInlineEnd: rowIndex < chunk.length - 1 ? '1rem' : '0',
                          }}>
                            <p style={{ margin: 0, width: '100%' }}>
                              {lineCells.map((part, index) => {
                                if (part.type === 'text') {
                                  return <span key={index}>{part.content}</span>;
                                } 
                                else if (part.type === 'write') {
                                  const isSpace = part.char.trim() === '' || part.char === '　';
                                  const isHidden = !isSpace && hideBlanks;
                                  const textColor = !hideBlanks ? 'text-terracotta' : '';

                                  const masu = (
                                    <span className="masu-inline">
                                      <span className={`masu-char ${isHidden ? 'opacity-0' : 'opacity-100'} ${textColor}`}>
                                        {part.char}
                                      </span>
                                    </span>
                                  );

                                  if (part.ruby) {
                                    return (
                                      <ruby key={index}>
                                        {masu}
                                        <rt>{part.ruby}</rt>
                                      </ruby>
                                    );
                                  } else {
                                    return <React.Fragment key={index}>{masu}</React.Fragment>;
                                  }
                                }
                                else if (part.type === 'read') {
                                  const isHidden = hideBlanks;
                                  const textColor = !hideBlanks ? 'text-terracotta' : '';
                                  const answerText = part.ruby || '　　'; 
                                  
                                  return (
                                    <ruby key={index} className="yomi-ruby">
                                      <span>{part.char}</span>
                                      <rt className="yomi-rt">
                                        <span className="yomi-bracket">（</span>
                                        <span className={`yomi-answer ${isHidden ? 'opacity-0' : 'opacity-100'} ${textColor}`}>
                                          {answerText}
                                        </span>
                                        <span className="yomi-bracket">）</span>
                                      </rt>
                                    </ruby>
                                  );
                                }
                              })}
                            </p>
                          </div>
                        ))}
                      </div>
                    ))}
                  </div>

                  {namePosition === 'left' && (
                    <div className="shrink-0 flex flex-col justify-end pb-8 pr-4 pl-4 border-r border-dashed border-bluegrey/20">
                      <VerticalNameField />
                    </div>
                  )}

                </div>

                {namePosition === 'bottom' && (
                  <div className="flex justify-start items-end border-t-2 border-bluegrey pt-4 mt-2 shrink-0 font-sans">
                    <div className="flex gap-4">
                      <div className="text-lg text-bluegrey flex items-end">
                        <span className="mr-2">ねん</span>
                        <span className="mr-2">くみ</span>
                      </div>
                      <div className="text-lg text-bluegrey flex items-end">
                        <span>なまえ</span>
                        <div className="w-48 border-b border-bluegrey ml-2"></div>
                      </div>
                    </div>
                  </div>
                )}

              </div>
            ))}
          </div>

        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
